<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:transparent}
    .card{box-sizing:border-box;width:100%;min-height:190px;border:1px solid #E5E7EB;border-radius:14px;padding:24px;background:#fff;text-align:center}
    .label{font-size:13px;color:#6B7280;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
    .value{font-size:58px;line-height:1;color:#007C89;font-weight:800;margin:12px 0 6px}
    .unit{font-size:21px;color:#111827;font-weight:700}
    .note{font-size:13px;color:#6B7280;margin-top:12px}
  </style>
</head>
<body>
  <div class="card">
    <div class="label">Estimated time saved</div>
    <div class="value">2.1</div>
    <div class="unit">minutes saved per user</div>
    <div class="note">Based on recent document markup survey results</div>
  </div>
</body>
</html>
